<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Resume</title>
  <style>
    @page {
      size: A4;
      margin: 1.5cm;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Hiragino Sans GB", "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 9.5pt;
      line-height: 1.35;
      font-weight: 400;
      color: #222;
      margin: 0;
      padding: 0;
    }
    h1 {
      font-size: 19pt;
      font-weight: 700;
      margin: 0 0 0.2em;
      color: #1a1a1a;
    }
    h2 {
      font-size: 11pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 2px solid #2563eb;
      padding-bottom: 0.2em;
      margin-top: 1.2em;
      margin-bottom: 0.5em;
      color: #2563eb;
    }
    h3 {
      font-size: 10pt;
      font-weight: 700;
      margin: 0.6em 0 0.2em;
      color: #333;
    }
    p { margin: 0.2em 0; }
    strong { font-weight: 700; }
    ul {
      margin: 0.3em 0;
      padding-left: 1.2em;
    }
    li { margin-bottom: 0.25em; }
    .contact {
      font-size: 9pt;
      color: #555;
      margin-bottom: 1em;
    }
    .contact a { color: #2563eb; text-decoration: none; }
    strong { color: #111; }
    .photo {
      position: absolute;
      top: 0;
      right: 0;
      width: 2.6cm;
      height: 3.2cm;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #ddd;
    }
    body.with-photo h1,
    body.with-photo .contact {
      padding-right: 3cm;
    }
    code, pre, kbd, samp { font-family: inherit; }
    em, i { font-style: normal; }
  </style>
</head>
<body {% if photo %}class="with-photo"{% endif %}>
  {% if photo %}<img class="photo" src="{{ photo }}" alt="profile photo">{% endif %}
  {{ content | safe }}
</body>
</html>
