<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Resume</title>
  <style>
    @page {
      size: A4;
      margin: 1.5cm;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Hiragino Sans GB", "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 9.5pt;
      line-height: 1.35;
      font-weight: 400;
      color: #000;
      margin: 0;
      padding: 0;
    }
    h1 {
      font-size: 18pt;
      font-weight: 700;
      text-align: center;
      margin: 0 0 0.2em;
    }
    .contact {
      text-align: center;
      font-size: 9pt;
      margin-bottom: 1em;
    }
    h2 {
      font-size: 10.5pt;
      font-weight: 700;
      border-bottom: 1px solid #000;
      margin-top: 1em;
      margin-bottom: 0.4em;
      text-transform: uppercase;
    }
    h3 {
      font-size: 10pt;
      font-weight: 700;
      margin: 0.5em 0 0.1em;
    }
    p { margin: 0.15em 0; }
    strong { font-weight: 700; }
    ul {
      margin: 0.25em 0;
      padding-left: 1.2em;
    }
    li { margin-bottom: 0.2em; }
    code, pre, kbd, samp { font-family: inherit; }
    em, i { font-style: normal; }
    .photo {
      position: absolute;
      top: 0;
      right: 0;
      width: 2.6cm;
      height: 3.2cm;
      object-fit: cover;
      border: 1px solid #000;
    }
    body.with-photo {
      padding-right: 3cm;
    }
    body.with-photo h1,
    body.with-photo .contact {
      text-align: left;
    }
  </style>
</head>
<body {% if photo %}class="with-photo"{% endif %}>
  {% if photo %}<img class="photo" src="{{ photo }}" alt="profile photo">{% endif %}
  {{ content | safe }}
</body>
</html>
